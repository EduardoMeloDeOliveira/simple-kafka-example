spring.application.name=persistence-api
server.port=8082
spring.datasource.url=jdbc:postgresql://localhost:5432/user_db
spring.datasource.username=root
spring.datasource.password=1033

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=user-persistence-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=io.github.EduardoMeloDeOliveira.persistence_api.dto
spring.kafka.consumer.properties.spring.json.value.default.type=io.github.EduardoMeloDeOliveira.persistence_api.dto.UserRequestDTO
